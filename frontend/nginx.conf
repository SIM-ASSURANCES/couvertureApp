server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Proxy API → backend. Résolution DNS dynamique (résolveur Docker embarqué,
    # 127.0.0.11) via une variable dans proxy_pass : sans ça, nginx résout
    # "backend" une seule fois au démarrage du worker et garde l'IP en cache
    # indéfiniment, ce qui casse le proxy dès que le conteneur backend est
    # recréé (nouvelle IP interne) sans redémarrage du frontend.
    resolver 127.0.0.11 valid=10s;

    location /api/ {
        set $backend_upstream http://backend:4000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Cache long pour les assets buildés (hash dans le nom)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA — renvoie toujours index.html pour les routes React Router.
    # index.html ne doit JAMAIS être mis en cache, sinon les nouveaux
    # déploiements ne sont pas pris en compte (l'ancien bundle reste chargé).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires -1;
    }
}
